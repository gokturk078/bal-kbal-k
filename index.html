<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>AQUA: Yıldız Balığı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui-layer { position: absolute; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    // ============================================
    // 1. MATH UTILITIES
    // ============================================
    class Vec2 {
      constructor(x, y) { this.x = x; this.y = y; }
      add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
      sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
      mult(s) { return new Vec2(this.x * s, this.y * s); }
      mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
      normalize() { const m = this.mag(); return m > 0 ? new Vec2(this.x/m, this.y/m) : new Vec2(0,0); }
      dist(v) { return Math.sqrt((this.x-v.x)**2 + (this.y-v.y)**2); }
    }

    // ============================================
    // 1.5. HAPTIC FEEDBACK (Titreşim)
    // ============================================
    const Haptics = {
      play(ms) {
        if (navigator.vibrate) {
          try { navigator.vibrate(ms); } catch(e) {}
        }
      }
    };

    // ============================================
    // 2. INPUT SYSTEM (Dinamik Joystick & Dash)
    // ============================================
    const InputSystem = {
      touches: new Map(),
      joystick: { active: false, origin: new Vec2(0,0), current: new Vec2(0,0), id: null },
      turbo: { active: false, justPressed: false, id: null },
      
      init() {
        const cvs = document.getElementById('gameCanvas');
        
        // --- TOUCH EVENTS (Mobil) ---
        cvs.addEventListener('touchstart', e => {
          e.preventDefault();
          for(let t of e.changedTouches) {
            this.touches.set(t.identifier, { startX: t.clientX, startY: t.clientY, x: t.clientX, y: t.clientY, isTap: true });
            
            UI.handleScrollStart(t.clientY); // Scroll başlangıcı
            
            if (t.clientX < window.innerWidth / 2 && !this.joystick.active) {
              this.joystick.active = true;
              this.joystick.origin = new Vec2(t.clientX, t.clientY);
              this.joystick.current = new Vec2(t.clientX, t.clientY);
              this.joystick.id = t.identifier;
            } else if (t.clientX >= window.innerWidth / 2 && !this.turbo.active) {
              this.turbo.active = true;
              this.turbo.justPressed = true;
              this.turbo.id = t.identifier;
            }
          }
        }, {passive: false});
        
        cvs.addEventListener('touchmove', e => {
          e.preventDefault();
          for(let t of e.changedTouches) {
            let touch = this.touches.get(t.identifier);
            if(touch) {
              touch.x = t.clientX; touch.y = t.clientY;
              if(Math.abs(touch.x - touch.startX) > 10 || Math.abs(touch.y - touch.startY) > 10) touch.isTap = false;
              
              UI.handleScrollMove(t.clientY); // Scroll hareketi
            }
            if (t.identifier === this.joystick.id) {
              this.joystick.current = new Vec2(t.clientX, t.clientY);
            }
          }
        }, {passive: false});
        
        cvs.addEventListener('touchend', e => {
          e.preventDefault();
          for(let t of e.changedTouches) {
            let touch = this.touches.get(t.identifier);
            if(touch && touch.isTap) UI.handleTouch(touch.x, touch.y);
            this.touches.delete(t.identifier);
            
            if (t.identifier === this.joystick.id) this.joystick.active = false;
            if (t.identifier === this.turbo.id) this.turbo.active = false;
          }
        });

        // --- MOUSE EVENTS (Masaüstü Testi İçin) ---
        cvs.addEventListener('mousedown', e => {
          e.preventDefault();
          const id = 'mouse';
          this.touches.set(id, { startX: e.clientX, startY: e.clientY, x: e.clientX, y: e.clientY, isTap: true });
          
          UI.handleScrollStart(e.clientY); // Scroll başlangıcı
          
          if (e.clientX < window.innerWidth / 2 && !this.joystick.active) {
            this.joystick.active = true;
            this.joystick.origin = new Vec2(e.clientX, e.clientY);
            this.joystick.current = new Vec2(e.clientX, e.clientY);
            this.joystick.id = id;
          } else if (e.clientX >= window.innerWidth / 2 && !this.turbo.active) {
            this.turbo.active = true;
            this.turbo.justPressed = true;
            this.turbo.id = id;
          }
        });
        
        cvs.addEventListener('mousemove', e => {
          e.preventDefault();
          const id = 'mouse';
          let touch = this.touches.get(id);
          if(touch) {
            touch.x = e.clientX; touch.y = e.clientY;
            if(Math.abs(touch.x - touch.startX) > 10 || Math.abs(touch.y - touch.startY) > 10) touch.isTap = false;
            
            UI.handleScrollMove(e.clientY); // Scroll hareketi
          }
          if (this.joystick.id === id) {
            this.joystick.current = new Vec2(e.clientX, e.clientY);
          }
        });
        
        cvs.addEventListener('mouseup', e => {
          e.preventDefault();
          const id = 'mouse';
          let touch = this.touches.get(id);
          if(touch && touch.isTap) UI.handleTouch(touch.x, touch.y);
          this.touches.delete(id);
          
          if (this.joystick.id === id) this.joystick.active = false;
          if (this.turbo.id === id) this.turbo.active = false;
        });

        // Garanti UI tıklaması (Desktop)
        cvs.addEventListener('click', e => {
          UI.handleTouch(e.clientX, e.clientY);
        });
      },
      
      getJoystick() {
        if (!this.joystick.active) return new Vec2(0,0);
        let joyVec = this.joystick.current.sub(this.joystick.origin);
        const maxDist = 60;
        
        // Sınırlandırma
        if (joyVec.mag() > maxDist) {
          joyVec = joyVec.normalize().mult(maxDist);
          // Joystick tabanını hafifçe parmağa doğru çek (Dynamic origin)
          this.joystick.origin = this.joystick.current.sub(joyVec);
        }
        
        // Deadzone (Ölü Bölge)
        if (joyVec.mag() < 10) return new Vec2(0,0);
        
        return joyVec.mult(1/maxDist); // 0 ile 1 arası vektör döner
      },
      
      consumeTurboPress() {
        if (this.turbo.justPressed) {
          this.turbo.justPressed = false;
          return true;
        }
        return false;
      }
    };

    // ============================================
    // 3. AUDIO SYSTEM
    // ============================================
    const AudioSystem = {
      ctx: null,
      init() { 
        const startAudio = () => {
          if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          if(this.ctx.state === 'suspended') this.ctx.resume();
        };
        window.addEventListener('touchstart', startAudio, {once:true});
        window.addEventListener('mousedown', startAudio, {once:true});
      },
      playTone(freq, duration, type='sine', vol=0.3) {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
      },
      sfx: {
        click: () => AudioSystem.playTone(600, 0.05, 'sine', 0.05),
        swim: () => AudioSystem.playTone(200, 0.1, 'sine', 0.05),
        collect: () => { AudioSystem.playTone(800, 0.1, 'sine', 0.1); setTimeout(()=>AudioSystem.playTone(1200, 0.2, 'sine', 0.1), 50); },
        win: () => [400,500,600,800].forEach((f,i) => setTimeout(()=>AudioSystem.playTone(f, 0.3, 'triangle', 0.2), i*150)),
        turbo: () => AudioSystem.playTone(100, 0.3, 'sawtooth', 0.1),
        dash: () => AudioSystem.playTone(150, 0.4, 'square', 0.15)
      }
    };

    // ============================================
    // 3.5. PARTICLE SYSTEM (Juice)
    // ============================================
    class Particle {
      constructor(x, y, vx, vy, life, color, size, type='circle') {
        this.pos = new Vec2(x,y); this.vel = new Vec2(vx,vy);
        this.life = life; this.maxLife = life;
        this.color = color; this.size = size;
        this.type = type; // 'circle', 'ring', 'line'
      }
      update(dt) { 
        this.pos = this.pos.add(this.vel.mult(dt*60)); 
        this.life -= dt; 
        if(this.type === 'ring') this.size += dt * 100; // Halka büyür
        else this.vel = this.vel.mult(0.95); // Sürtünme
      }
      render(ctx, camera) {
        const alpha = Math.max(0, this.life / this.maxLife);
        const sx = (this.pos.x - camera.x)*camera.zoom + window.innerWidth/2;
        const sy = (this.pos.y - camera.y)*camera.zoom + window.innerHeight/2;
        ctx.globalAlpha = alpha;
        
        if (this.type === 'circle') {
          ctx.fillStyle = this.color;
          ctx.beginPath(); ctx.arc(sx, sy, this.size*camera.zoom, 0, Math.PI*2); ctx.fill();
        } else if (this.type === 'ring') {
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 3 * camera.zoom;
          ctx.beginPath(); ctx.arc(sx, sy, this.size*camera.zoom, 0, Math.PI*2); ctx.stroke();
        } else if (this.type === 'line') {
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 2 * camera.zoom;
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(sx - this.vel.x * 0.5 * camera.zoom, sy - this.vel.y * 0.5 * camera.zoom);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
    }

    const ParticleSystem = {
      particles: [],
      emit(x, y, vx, vy, life, color, size, type='circle') { this.particles.push(new Particle(x,y,vx,vy,life,color,size,type)); },
      burst(x, y, count, color) {
        for(let i=0; i<count; i++) {
          let angle = (i/count) * Math.PI * 2;
          let speed = 2 + Math.random() * 3;
          this.emit(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, 0.5 + Math.random()*0.5, color, 2 + Math.random()*3);
        }
      },
      dashBurst(x, y, vel) {
        // Genişleyen halka
        this.emit(x, y, 0, 0, 0.4, 'rgba(0, 255, 255, 0.8)', 10, 'ring');
        // Hız çizgileri (ters yöne)
        const dir = vel.normalize();
        for(let i=0; i<8; i++) {
          let spread = (Math.random() - 0.5) * 0.5;
          let speed = 5 + Math.random() * 5;
          let vx = (-dir.x + spread) * speed;
          let vy = (-dir.y + spread) * speed;
          this.emit(x, y, vx, vy, 0.3 + Math.random()*0.2, 'rgba(255, 255, 255, 0.6)', 0, 'line');
        }
      },
      update(dt) {
        this.particles.forEach(p => p.update(dt));
        this.particles = this.particles.filter(p => p.life > 0);
      },
      render(ctx, camera) {
        this.particles.forEach(p => p.render(ctx, camera));
      }
    };

    // ============================================
    // 4. RENDERER & CAMERA (Look-ahead & Zoom)
    // ============================================
    const Renderer = {
      canvas: null, ctx: null, camera: {x:0, y:0, zoom:1}, shakeTime: 0,
      init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize(); window.addEventListener('resize', ()=>this.resize());
      },
      resize() {
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = window.innerWidth * dpr; this.canvas.height = window.innerHeight * dpr;
        this.ctx.scale(dpr, dpr);
      },
      updateCamera(target, vel, isDashing, dt) {
        // Look-ahead (Hız yönüne doğru kamerayı kaydır)
        const lookAhead = vel.mult(15);
        const targetCamX = target.x + lookAhead.x;
        const targetCamY = target.y + lookAhead.y;
        
        this.camera.x += (targetCamX - this.camera.x) * 4 * dt;
        this.camera.y += (targetCamY - this.camera.y) * 4 * dt;
        
        // Dinamik Zoom (Dash atarken hafif uzaklaş)
        const targetZoom = isDashing ? 0.85 : 1.0;
        this.camera.zoom += (targetZoom - this.camera.zoom) * 3 * dt;

        if(this.shakeTime > 0) this.shakeTime -= dt;
      },
      shake(intensity = 0.2) { this.shakeTime = intensity; },
      worldToScreen(x, y) {
        let sx = (x - this.camera.x)*this.camera.zoom + window.innerWidth/2;
        let sy = (y - this.camera.y)*this.camera.zoom + window.innerHeight/2;
        if(this.shakeTime > 0) {
          sx += (Math.random()-0.5)*15 * this.shakeTime; sy += (Math.random()-0.5)*15 * this.shakeTime;
        }
        return { x: sx, y: sy };
      },
      clear() { this.ctx.clearRect(0,0, window.innerWidth, window.innerHeight); },
      
      // Squash & Stretch parametreleri eklendi
      drawFish(pos, vel, radius, color, glow=false, stretch=1, squash=1) {
        const {x, y} = this.worldToScreen(pos.x, pos.y);
        const r = radius * this.camera.zoom;
        const ctx = this.ctx;
        ctx.save();
        if(glow) { ctx.shadowBlur = 20; ctx.shadowColor = color; }
        
        ctx.translate(x, y);
        ctx.rotate(Math.atan2(vel.y, vel.x));
        ctx.scale(stretch, squash); // Esneme ve basılma uygula
        
        // Gövde
        ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.6, 0, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
        
        // Kuyruk
        const tailAngle = Math.sin(Date.now()/100)*0.5;
        ctx.beginPath(); ctx.moveTo(-r*0.5, 0); ctx.lineTo(-r*1.2, -r*0.5 + tailAngle*r); ctx.lineTo(-r*1.2, r*0.5 + tailAngle*r); ctx.fill();
        
        // Göz
        ctx.beginPath(); ctx.arc(r*0.3, -r*0.2, r*0.2, 0, Math.PI*2); ctx.fillStyle='white'; ctx.fill();
        ctx.beginPath(); ctx.arc(r*0.35, -r*0.2, r*0.1, 0, Math.PI*2); ctx.fillStyle='black'; ctx.fill();
        
        ctx.restore();
      }
    };

    // ============================================
    // 5. PHYSICS & ENTITIES (Stamina & Squash/Stretch)
    // ============================================
    class Entity {
      constructor(x, y, r) { this.pos = new Vec2(x,y); this.vel = new Vec2(0,0); this.acc = new Vec2(0,0); this.radius = r; this.mass = 1; this.friction = 0.96; this.maxSpeed = 8; }
      applyForce(f) { this.acc = this.acc.add(f.mult(1/this.mass)); }
      update(dt) {
        this.vel = this.vel.add(this.acc.mult(dt*60));
        this.vel = this.vel.mult(this.friction);
        if(this.vel.mag() > this.maxSpeed) this.vel = this.vel.normalize().mult(this.maxSpeed);
        this.pos = this.pos.add(this.vel.mult(dt*60));
        this.acc = new Vec2(0,0);
      }
    }

    class PlayerFish extends Entity {
      constructor(x,y) { 
        super(x,y,20); 
        this.color = SKINS[SaveSystem.load().currentSkin].color; // Seçili skini uygula
        this.stamina = 100; 
        this.maxStamina = 100;
        this.isDashing = false;
        this.shockTimer = 0; // Denizanası şoku için
      }
      
      updatePlayer(dt, joy, turboActive, turboJustPressed) {
        this.isDashing = false;
        
        // Şok Durumu (Kontrol Kaybı)
        if (this.shockTimer > 0) {
          this.shockTimer -= dt;
          this.maxSpeed = 3;
          this.vel = this.vel.add(new Vec2((Math.random()-0.5)*10, (Math.random()-0.5)*10)); // Rastgele titreme
          if(Math.random()<0.2) ParticleSystem.emit(this.pos.x, this.pos.y, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 0.2, '#ffff00', 3, 'line');
          super.update(dt);
          return; // Kontrolleri yoksay
        }
        
        // Dash & Stamina Logic
        if (turboActive && this.stamina > 0) {
          if (turboJustPressed && this.stamina >= 25) {
            // Dash Impulse
            this.vel = this.vel.add(joy.mag() > 0 ? joy.normalize().mult(20) : new Vec2(20,0));
            this.stamina -= 25;
            Haptics.play(20);
            AudioSystem.sfx.dash();
            Renderer.shake(0.1);
            ParticleSystem.dashBurst(this.pos.x, this.pos.y, this.vel);
          }
          this.maxSpeed = 14;
          this.stamina -= 40 * dt; // Drain
          this.isDashing = true;
          
          if (Math.random() < 0.1) AudioSystem.sfx.turbo();
        } else {
          this.maxSpeed = 7;
          this.stamina = Math.min(this.maxStamina, this.stamina + 20 * dt); // Regen
        }
        if (this.stamina < 0) this.stamina = 0;

        // Hareket kuvveti uygula
        this.applyForce(joy.mult(this.isDashing ? 2.0 : 1.0));
        super.update(dt);

        // Kuyruk izi (Trail) partikülleri
        if (this.vel.mag() > 3 && Math.random() < (this.isDashing ? 0.6 : 0.2)) {
          ParticleSystem.emit(
            this.pos.x - this.vel.x*0.5 + (Math.random()-0.5)*10, 
            this.pos.y - this.vel.y*0.5 + (Math.random()-0.5)*10, 
            -this.vel.x*0.1, -this.vel.y*0.1, 
            0.5 + Math.random()*0.5, 'rgba(255,255,255,0.4)', 2 + Math.random()*3, 'circle'
          );
        }
      }
      
      render() {
        // Squash & Stretch Hesaplama
        const speed = this.vel.mag();
        let stretch = 1 + (speed / 15) * 0.6; 
        let squash = 1 / stretch; 
        
        // Şok durumunda renk değişimi
        const drawColor = this.shockTimer > 0 ? (Math.random()>0.5 ? '#ffff00' : '#ffffff') : this.color;
        
        Renderer.drawFish(this.pos, this.vel.mag()>0.1?this.vel:new Vec2(1,0), this.radius, drawColor, this.isDashing || this.shockTimer>0, stretch, squash);
      }
    }

    const Collision = {
      circleCircle: (c1, c2) => c1.pos.dist(c2.pos) < (c1.radius + c2.radius),
      resolveCircleRect: (c, r) => {
        const cx = Math.max(r.x, Math.min(c.pos.x, r.x+r.w)), cy = Math.max(r.y, Math.min(c.pos.y, r.y+r.h));
        const distSq = (c.pos.x-cx)**2 + (c.pos.y-cy)**2;
        if(distSq < c.radius**2 && distSq > 0) {
          const dist = Math.sqrt(distSq);
          const overlap = c.radius - dist;
          const nx = (c.pos.x - cx)/dist, ny = (c.pos.y - cy)/dist;
          
          // Kırılabilir Kaya (Breakable Rock) Kontrolü
          if(r.type === 'breakable') {
            if(c.isDashing) {
              r.broken = true; // Kayayı kır
              Renderer.shake(0.3);
              Haptics.play(30);
              ParticleSystem.burst(cx, cy, 20, '#8b4513');
              AudioSystem.sfx.dash(); // Kırılma sesi (geçici)
              return; // Çarpışmayı çözme, içinden geç
            }
          }
          
          c.pos.x += nx * overlap; c.pos.y += ny * overlap;
          
          const dot = c.vel.x*nx + c.vel.y*ny;
          c.vel.x -= 2*dot*nx; c.vel.y -= 2*dot*ny;
          
          // Sert çarpışma geri bildirimi
          if(Math.abs(dot) > 3) {
            Renderer.shake(0.2);
            Haptics.play(15);
            ParticleSystem.burst(cx, cy, 5, 'rgba(255,255,255,0.5)');
          }
        }
      }
    };

    // ============================================
    // 6. LEVEL SYSTEM (Hazards & Enemies)
    // ============================================
    const LEVELS = Array.from({length: 100}, (_, i) => {
      const world = Math.floor(i/10)+1, level = (i%10)+1;
      
      // Prosedürel Engeller (Hazards)
      const hazards = [];
      const enemies = [];
      
      // Seviye 2'den itibaren Akıntılar (Currents)
      if(level > 1) {
        hazards.push({x: 400, y: 200, w: 200, h: 400, type: 'current', dir: new Vec2(0, -1), force: 0.5});
      }
      // Seviye 3'ten itibaren Girdaplar (Whirlpools)
      if(level > 2) {
        hazards.push({x: 700, y: 500, r: 150, type: 'whirlpool', force: 0.8});
      }
      // Seviye 4'ten itibaren Kırılabilir Kayalar (Breakable)
      const tiles = [
        {x: 0, y: 0, w: 1000+level*200, h: 40, type: 'wall'},
        {x: 0, y: 760+level*100, w: 1000+level*200, h: 40, type: 'wall'},
        {x: 0, y: 0, w: 40, h: 800+level*100, type: 'wall'},
        {x: 960+level*200, y: 0, w: 40, h: 800+level*100, type: 'wall'}
      ];
      
      for(let j=0; j<level*2; j++) {
        let isBreakable = level > 3 && Math.random() > 0.5;
        tiles.push({
          x: 300 + Math.random()*(500+level*200), 
          y: 100 + Math.random()*(500+level*100), 
          w: 50+Math.random()*100, h: 50+Math.random()*100, 
          type: isBreakable ? 'breakable' : 'wall',
          broken: false
        });
      }
      
      // Seviye 5'ten itibaren Düşmanlar (Urchins & Jellyfish)
      if(level > 4) {
        for(let j=0; j<Math.floor(level/2); j++) {
          if(Math.random() > 0.5) {
            enemies.push({x: 500 + Math.random()*400, y: 300 + Math.random()*300, r: 25, type: 'urchin'});
          } else {
            enemies.push({
              x: 600 + Math.random()*400, y: 400, r: 20, type: 'jellyfish', 
              startY: 400, range: 150, speed: 2 + Math.random()*2, phase: Math.random()*Math.PI*2
            });
          }
        }
      }

      return {
        id: `${world}-${level}`, name: `Seviye ${world}-${level}`, world,
        size: {w: 1000 + level*200, h: 800 + level*100},
        playerStart: {x: 100, y: 400},
        goal: {x: 900 + level*200, y: 400, r: 50},
        tiles: tiles,
        hazards: hazards,
        enemies: enemies,
        collectibles: Array.from({length: 3}, (_, j) => ({
          x: 200 + Math.random()*(600+level*200), y: 100 + Math.random()*(600+level*100), type: 'star'
        })),
        objectives: { timeLimit: 30 + level*5, starThresholds: [10+level*2, 20+level*3, 30+level*4] }
      };
    });

    class Level {
      constructor(id) {
        this.data = LEVELS.find(l => l.id === id) || LEVELS[0];
        this.stars = this.data.collectibles.map(c => ({...c, r: 15, collected: false}));
        
        // Prosedürel Deniz Yosunları (Seaweed)
        this.seaweeds = [];
        for(let i=0; i<15; i++) {
          this.seaweeds.push({
            x: Math.random() * this.data.size.w,
            y: this.data.size.h, // Tabandan başlar
            segments: 5 + Math.floor(Math.random()*5),
            phase: Math.random() * Math.PI * 2,
            speed: 0.5 + Math.random() * 1.5
          });
        }
      }
      
      updateEnemies(dt) {
        this.data.enemies.forEach(e => {
          if(e.type === 'jellyfish') {
            e.y = e.startY + Math.sin(Date.now()/1000 * e.speed + e.phase) * e.range;
          }
        });
      }

      renderBg() {
        const ctx = Renderer.ctx;
        const grad = ctx.createLinearGradient(0,0,0,window.innerHeight);
        grad.addColorStop(0, ['#001f3f','#003300','#330000'][this.data.world%3]);
        grad.addColorStop(1, ['#003366','#006600','#660000'][this.data.world%3]);
        ctx.fillStyle = grad; ctx.fillRect(0,0,window.innerWidth, window.innerHeight);
        
        // Dinamik Işık Huzmeleri (Light Shafts)
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const time = Date.now() / 1000;
        for(let i=0; i<3; i++) {
          const sx = (window.innerWidth * 0.3 * i) + Math.sin(time * 0.5 + i) * 100;
          const shaftGrad = ctx.createLinearGradient(sx, 0, sx + 150, window.innerHeight);
          shaftGrad.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
          shaftGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
          ctx.fillStyle = shaftGrad;
          ctx.beginPath();
          ctx.moveTo(sx - 100, 0);
          ctx.lineTo(sx + 100, 0);
          ctx.lineTo(sx + 300, window.innerHeight);
          ctx.lineTo(sx - 50, window.innerHeight);
          ctx.fill();
        }
        ctx.restore();

        // Parallax bubbles
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        for(let i=0; i<20; i++) {
          let bx = (i*100 - Renderer.camera.x*0.2) % window.innerWidth;
          if(bx < 0) bx += window.innerWidth;
          let by = (i*80 - Date.now()/50) % window.innerHeight;
          if(by < 0) by += window.innerHeight;
          ctx.beginPath(); ctx.arc(bx, by, 5 + (i%5)*2, 0, Math.PI*2); ctx.fill();
        }
        
        // Deniz Yosunları (Seaweed) Çizimi
        ctx.strokeStyle = 'rgba(34, 139, 34, 0.4)'; // Yarı saydam yeşil
        ctx.lineWidth = 8 * Renderer.camera.zoom;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        this.seaweeds.forEach(sw => {
          const {x: startX, y: startY} = Renderer.worldToScreen(sw.x, sw.y);
          // Ekranda değilse çizme (Optimizasyon)
          if(startX < -50 || startX > window.innerWidth + 50) return;
          
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          
          let currentX = startX;
          let currentY = startY;
          const segmentLength = 30 * Renderer.camera.zoom;
          
          for(let i=1; i<=sw.segments; i++) {
            // Sinüs dalgası ile salınım
            const sway = Math.sin(time * sw.speed + sw.phase + i * 0.5) * 15 * Renderer.camera.zoom;
            currentX += sway;
            currentY -= segmentLength;
            ctx.lineTo(currentX, currentY);
          }
          ctx.stroke();
        });
      }
      renderFg() {
        const ctx = Renderer.ctx;
        const time = Date.now() / 1000;
        
        // Hazards (Tehlikeler)
        this.data.hazards.forEach(h => {
          if(h.type === 'current') {
            const {x,y} = Renderer.worldToScreen(h.x, h.y);
            ctx.fillStyle = 'rgba(0, 150, 255, 0.2)';
            ctx.fillRect(x, y, h.w*Renderer.camera.zoom, h.h*Renderer.camera.zoom);
            // Akıntı çizgileri
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
            ctx.beginPath();
            for(let i=0; i<5; i++) {
              let lx = x + (h.w/5)*i*Renderer.camera.zoom;
              let ly = y + ((time*50 + i*20) % h.h)*Renderer.camera.zoom;
              ctx.moveTo(lx, ly); ctx.lineTo(lx + h.dir.x*20, ly + h.dir.y*20);
            }
            ctx.stroke();
          } else if(h.type === 'whirlpool') {
            const {x,y} = Renderer.worldToScreen(h.x, h.y);
            ctx.save(); ctx.translate(x,y); ctx.rotate(time * 2);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)'; ctx.lineWidth = 3;
            ctx.beginPath();
            for(let i=0; i<10; i++) {
              ctx.arc(0, 0, (h.r - i*15)*Renderer.camera.zoom, i*0.5, i*0.5 + Math.PI);
            }
            ctx.stroke(); ctx.restore();
          }
        });

        // Tiles (Duvarlar ve Kırılabilir Kayalar)
        this.data.tiles.forEach(t => {
          if(t.broken) return;
          const {x,y} = Renderer.worldToScreen(t.x, t.y);
          if(t.type === 'breakable') {
            ctx.fillStyle = '#8b4513'; // Kahverengi kaya
            ctx.fillRect(x, y, t.w*Renderer.camera.zoom, t.h*Renderer.camera.zoom);
            // Çatlaklar
            ctx.strokeStyle = '#5c2e0b'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+t.w*Renderer.camera.zoom, y+t.h*Renderer.camera.zoom); ctx.stroke();
          } else {
            ctx.fillStyle = '#111'; ctx.fillRect(x, y, t.w*Renderer.camera.zoom, t.h*Renderer.camera.zoom);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.strokeRect(x, y, t.w*Renderer.camera.zoom, t.h*Renderer.camera.zoom);
          }
        });
        
        // Enemies (Düşmanlar)
        this.data.enemies.forEach(e => {
          const {x,y} = Renderer.worldToScreen(e.x, e.y);
          if(e.type === 'urchin') {
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x, y, e.r*Renderer.camera.zoom, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            for(let i=0; i<12; i++) {
              let a = (i/12)*Math.PI*2;
              ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.cos(a)*e.r*1.5*Renderer.camera.zoom, y+Math.sin(a)*e.r*1.5*Renderer.camera.zoom); ctx.stroke();
            }
          } else if(e.type === 'jellyfish') {
            ctx.fillStyle = 'rgba(255, 105, 180, 0.8)'; // Pembe
            ctx.beginPath(); ctx.arc(x, y, e.r*Renderer.camera.zoom, Math.PI, 0); ctx.fill();
            // Dokunaçlar
            ctx.strokeStyle = 'rgba(255, 105, 180, 0.6)'; ctx.lineWidth = 2;
            for(let i=-1; i<=1; i++) {
              ctx.beginPath(); ctx.moveTo(x + i*10*Renderer.camera.zoom, y); 
              ctx.lineTo(x + i*15*Renderer.camera.zoom + Math.sin(time*5+i)*10, y + e.r*2*Renderer.camera.zoom); ctx.stroke();
            }
          }
        });

        // Stars (Yıldızlar)
        this.stars.forEach(s => {
          if(s.collected) return;
          const {x,y} = Renderer.worldToScreen(s.x, s.y);
          ctx.save(); ctx.translate(x,y); ctx.rotate(Date.now()/500);
          ctx.fillStyle = 'gold'; ctx.shadowBlur = 15; ctx.shadowColor = 'yellow';
          ctx.beginPath();
          for(let i=0; i<5; i++) {
            ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*s.r*Renderer.camera.zoom, -Math.sin((18+i*72)*Math.PI/180)*s.r*Renderer.camera.zoom);
            ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*s.r*0.5*Renderer.camera.zoom, -Math.sin((54+i*72)*Math.PI/180)*s.r*0.5*Renderer.camera.zoom);
          }
          ctx.closePath(); ctx.fill(); ctx.restore();
        });
        
        // Goal (Bitiş)
        const goal = this.data.goal;
        const {x:gx, y:gy} = Renderer.worldToScreen(goal.x, goal.y);
        ctx.beginPath(); ctx.arc(gx, gy, goal.r*Renderer.camera.zoom, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0, 255, 255, ${0.3 + Math.sin(Date.now()/200)*0.2})`; ctx.fill();
        ctx.strokeStyle = 'cyan'; ctx.lineWidth = 3; ctx.stroke();
      }
    }

    // ============================================
    // 7. UI SYSTEM (Menus & HUD)
    // ============================================
    const UI = {
      buttons: [], texts: [],
      scrollOffset: 0,
      maxScroll: 0,
      touchStartY: 0,
      isScrolling: false,
      
      clear() { this.buttons = []; this.texts = []; },
      addBtn(x, y, w, h, text, cb, color='#2c3e50', disabled=false, skinId=null, price=0) { 
        this.buttons.push({x,y,w,h,text,cb,color,disabled,skinId,price}); 
      },
      addText(x, y, text, font, color, align='center') { this.texts.push({x,y,text,font,color,align}); },
      
      handleScrollStart(y) {
        this.touchStartY = y;
        this.isScrolling = false;
      },
      
      handleScrollMove(y) {
        const isScrollable = StateMachine.current === 'level_select' || StateMachine.current === 'shop';
        if(!isScrollable) return;
        
        const dy = y - this.touchStartY;
        if(Math.abs(dy) > 10) this.isScrolling = true;
        
        if(this.isScrolling) {
          this.scrollOffset += dy;
          this.touchStartY = y;
          
          // Sınırlandırma
          if(this.scrollOffset > 0) this.scrollOffset = 0;
          if(this.scrollOffset < -this.maxScroll) this.scrollOffset = -this.maxScroll;
        }
      },

      render() {
        const ctx = Renderer.ctx;
        const state = StateMachine.current;
        const w = window.innerWidth, h = window.innerHeight;
        
        ctx.save();
        
        // Scroll uygulanacak ekranlar
        if(state === 'level_select' || state === 'shop') {
          ctx.translate(0, this.scrollOffset);
        }

        this.buttons.forEach(b => {
          // Geri butonu sabit kalsın (scroll'dan etkilenmesin)
          if((state === 'level_select' || state === 'shop') && b.text === 'Geri') {
            ctx.restore();
            ctx.save();
          }

          ctx.fillStyle = b.disabled ? '#555' : b.color; 
          ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 12); ctx.fill();
          
          // Skin Rengi Önizleme (Mağaza için)
          if(b.skinId) {
            ctx.fillStyle = SKINS[b.skinId].color;
            ctx.beginPath(); ctx.arc(b.x + 40, b.y + b.h/2, 20, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.fillStyle = b.disabled ? '#888' : '#fff'; 
            ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(b.text, b.x + 80, b.y + b.h/2);
            
            // Fiyat veya Durum
            ctx.textAlign = 'right';
            const s = SaveSystem.load();
            if(s.currentSkin === b.skinId) {
              ctx.fillStyle = '#00ff00'; ctx.fillText('Kuşanıldı', b.x + b.w - 20, b.y + b.h/2);
            } else if(s.unlockedSkins.includes(b.skinId)) {
              ctx.fillStyle = '#fff'; ctx.fillText('Sahip', b.x + b.w - 20, b.y + b.h/2);
            } else {
              ctx.fillStyle = 'gold'; ctx.fillText(`${b.price} İnci`, b.x + b.w - 20, b.y + b.h/2);
            }
          } else {
            // Normal Buton Metni
            ctx.fillStyle = b.disabled ? '#888' : 'white'; 
            ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            // Satır sonu karakteri (\n) varsa iki satır yazdır
            if(b.text.includes('\n')) {
              const lines = b.text.split('\n');
              ctx.fillText(lines[0], b.x+b.w/2, b.y+b.h/2 - 10);
              ctx.fillStyle = 'gold'; ctx.font = '16px sans-serif';
              ctx.fillText(lines[1], b.x+b.w/2, b.y+b.h/2 + 15);
            } else {
              ctx.fillText(b.text, b.x+b.w/2, b.y+b.h/2);
            }
          }
        });
        
        this.texts.forEach(t => {
          // Sabit metinler (Başlıklar, İnci göstergesi vb.)
          if(t.fixed) {
            ctx.restore();
            ctx.save();
          }
          ctx.fillStyle = t.color; ctx.font = t.font; ctx.textAlign = t.align; ctx.textBaseline = 'middle';
          ctx.fillText(t.text, t.x, t.y);
        });
        
        ctx.restore();
      },
      handleTouch(tx, ty) {
        if(this.isScrolling) return; // Kaydırma yapılıyorsa tıklamayı iptal et
        
        const state = StateMachine.current;
        const isScrollable = state === 'level_select' || state === 'shop';
        
        for(let b of this.buttons) {
          if(b.disabled) continue;
          
          // Geri butonu sabit, scroll offset ekleme
          let offsetY = (isScrollable && b.text !== 'Geri') ? this.scrollOffset : 0;
          
          if(tx>=b.x && tx<=b.x+b.w && ty>=b.y + offsetY && ty<=b.y+b.h + offsetY) {
            AudioSystem.sfx.click();
            Haptics.play(10);
            b.cb();
            return;
          }
        }
        
        // HUD Pause
        if(state === 'play') {
          if(tx > window.innerWidth - 80 && tx < window.innerWidth - 20 && ty > 20 && ty < 60) {
            AudioSystem.sfx.click();
            StateMachine.change('pause', Game.level ? Game.level.data.id : null);
          }
        }
      }
    };

    // ============================================
    // 8. SAVE SYSTEM & PROGRESSION (Meta-Game)
    // ============================================
    const SaveSystem = {
      key: 'aqua_save_v1',
      load() { 
        const defaultSave = { 
          unlocked: ['1-1'], 
          stars: {}, 
          customName: '',
          pearls: 0, // Yeni para birimi
          unlockedSkins: ['default'],
          currentSkin: 'default'
        };
        const saved = JSON.parse(localStorage.getItem(this.key));
        return saved ? {...defaultSave, ...saved} : defaultSave;
      },
      save(data) { localStorage.setItem(this.key, JSON.stringify(data)); },
      unlock(id) { const s = this.load(); if(!s.unlocked.includes(id)) { s.unlocked.push(id); this.save(s); } },
      complete(id, stars) { 
        const s = this.load(); 
        const currentStars = s.stars[id] || 0;
        if(stars > currentStars) {
          s.stars[id] = stars;
          // Kazanılan ekstra yıldız başına 10 inci ver
          s.pearls += (stars - currentStars) * 10;
        }
        // Bölüm bitirme ödülü: Sabit 5 inci
        s.pearls += 5;
        this.save(s); 
      },
      addPearls(amount) {
        const s = this.load();
        s.pearls += amount;
        this.save(s);
      },
      buySkin(skinId, price) {
        const s = this.load();
        if(s.pearls >= price && !s.unlockedSkins.includes(skinId)) {
          s.pearls -= price;
          s.unlockedSkins.push(skinId);
          s.currentSkin = skinId;
          this.save(s);
          return true;
        }
        return false;
      },
      equipSkin(skinId) {
        const s = this.load();
        if(s.unlockedSkins.includes(skinId)) {
          s.currentSkin = skinId;
          this.save(s);
        }
      }
    };

    // Kozmetik Görünümler (Skins)
    const SKINS = {
      'default': { name: 'Turuncu (Klasik)', color: '#ff9900', price: 0 },
      'neon': { name: 'Neon Mavi', color: '#00ffff', price: 50 },
      'toxic': { name: 'Zehirli Yeşil', color: '#39ff14', price: 100 },
      'royal': { name: 'Kraliyet Moru', color: '#9d00ff', price: 150 },
      'shadow': { name: 'Gölge Siyahı', color: '#222222', price: 250 },
      'gold': { name: 'Saf Altın', color: '#ffd700', price: 500 }
    };

    // ============================================
    // 9. GAME STATES
    // ============================================
    const StateMachine = {
      current: null, states: {},
      change(name, data) { if(this.current && this.states[this.current].exit) this.states[this.current].exit(); this.current = name; UI.clear(); this.states[name].enter(data); },
      update(dt) { if(this.current) this.states[this.current].update(dt); },
      render() { if(this.current) this.states[this.current].render(); UI.render(); }
    };

    StateMachine.states.menu = {
      enter() {
        const s = SaveSystem.load();
        if(!s.customName) {
          const name = prompt("Balığının adı neydi?") || "Yıldız";
          s.customName = name; SaveSystem.save(s);
        }
        
        const w = window.innerWidth, h = window.innerHeight;
        UI.addText(w/2, h/3, "AQUA: Yıldız Balığı", "bold 40px sans-serif", "white");
        UI.addText(w/2, h/3 + 40, `Hoşgeldin, ${s.customName}`, "20px sans-serif", "cyan");
        
        // İnci Göstergesi
        UI.texts.push({x: w - 20, y: 40, text: `İnciler: ${s.pearls}`, font: "20px sans-serif", color: "white", align: "right", fixed: true});
        
        const btnW = Math.min(250, w*0.6);
        UI.addBtn(w/2 - btnW/2, h/2, btnW, 60, "OYNA", () => StateMachine.change('level_select'), '#4a90d9');
        UI.addBtn(w/2 - btnW/2, h/2 + 80, btnW, 60, "MAĞAZA", () => StateMachine.change('shop'), '#9b59b6');
      },
      update() {}, render() { Renderer.clear(); Renderer.ctx.fillStyle='#001f3f'; Renderer.ctx.fillRect(0,0,window.innerWidth,window.innerHeight); }
    };

    StateMachine.states.level_select = {
      enter() {
        const s = SaveSystem.load();
        const w = window.innerWidth, h = window.innerHeight;
        
        UI.texts.push({x: w/2, y: 50, text: "Bölüm Seç", font: "bold 30px sans-serif", color: "white", align: "center", fixed: true});
        UI.texts.push({x: w - 20, y: 40, text: `İnciler: ${s.pearls}`, font: "20px sans-serif", color: "white", align: "right", fixed: true});
        
        UI.addBtn(20, h - 70, 100, 50, "Geri", () => StateMachine.change('menu'), '#e74c3c');
        
        const cols = Math.floor(w / 120);
        const startX = (w - (cols * 110)) / 2;
        
        let row = 0, col = 0;
        LEVELS.forEach(l => {
          const unlocked = s.unlocked.includes(l.id);
          const stars = s.stars[l.id] || 0;
          const bx = startX + col * 110;
          const by = 120 + row * 110;
          
          UI.addBtn(bx, by, 90, 90, unlocked ? `${l.id}\n${'★'.repeat(stars)}${'☆'.repeat(3-stars)}` : "L", () => { 
            if(unlocked) StateMachine.change('play', l.id); 
          }, unlocked ? '#2ecc71' : '#7f8c8d', !unlocked);
          
          col++; if(col >= cols) { col = 0; row++; }
        });
        
        UI.maxScroll = Math.max(0, (120 + (row+1) * 110) - h + 100);
      },
      update() {}, render() { Renderer.clear(); Renderer.ctx.fillStyle='#001f3f'; Renderer.ctx.fillRect(0,0,window.innerWidth,window.innerHeight); }
    };

    StateMachine.states.shop = {
      enter() {
        const s = SaveSystem.load();
        const w = window.innerWidth, h = window.innerHeight;
        
        UI.texts.push({x: w/2, y: 50, text: "Kozmetik Mağazası", font: "bold 30px sans-serif", color: "white", align: "center", fixed: true});
        UI.texts.push({x: w/2, y: 90, text: `Mevcut İnciler: ${s.pearls}`, font: "24px sans-serif", color: "cyan", align: "center", fixed: true});
        
        UI.addBtn(20, h - 70, 100, 50, "Geri", () => StateMachine.change('menu'), '#e74c3c');
        
        const btnW = Math.min(350, w*0.9);
        const startX = w/2 - btnW/2;
        
        let row = 0;
        for (const [skinId, skin] of Object.entries(SKINS)) {
          const by = 140 + row * 80;
          const isUnlocked = s.unlockedSkins.includes(skinId);
          const isEquipped = s.currentSkin === skinId;
          
          let btnColor = isEquipped ? '#27ae60' : (isUnlocked ? '#2980b9' : '#d35400');
          
          UI.addBtn(startX, by, btnW, 60, skin.name, () => {
            if (isUnlocked) {
              SaveSystem.equipSkin(skinId);
              StateMachine.change('shop'); // UI'ı yenile
              AudioSystem.sfx.collect();
            } else {
              if (SaveSystem.buySkin(skinId, skin.price)) {
                StateMachine.change('shop'); // UI'ı yenile
                AudioSystem.sfx.win();
              } else {
                Haptics.play([50, 50]); // Yetersiz bakiye
              }
            }
          }, btnColor, false, skinId, skin.price);
          
          row++;
        }
        
        UI.maxScroll = Math.max(0, (140 + row * 80) - h + 100);
      },
      update() {}, render() { Renderer.clear(); Renderer.ctx.fillStyle='#001f3f'; Renderer.ctx.fillRect(0,0,window.innerWidth,window.innerHeight); }
    };

    StateMachine.states.play = {
      enter(id) {
        Game.level = new Level(id);
        this.level = Game.level;
        this.player = new PlayerFish(this.level.data.playerStart.x, this.level.data.playerStart.y);
        this.time = 0; this.stars = 0;
        Renderer.camera.x = this.player.pos.x; Renderer.camera.y = this.player.pos.y;
        // Pause butonu artık UI.render içinde çiziliyor, handleTouch içinde kontrol ediliyor.
        // UI.addBtn kullanmıyoruz çünkü play state'inde butonların sürekli temizlenip eklenmesi sorun yaratabilir.
      },
      update(dt) {
        this.time += dt;
        
        const joy = InputSystem.getJoystick();
        const turboActive = InputSystem.turbo.active;
        const turboJustPressed = InputSystem.consumeTurboPress();
        
        if(joy.mag() > 0 && Math.random()<0.1 && !this.player.isDashing) AudioSystem.sfx.swim();
        
        this.player.updatePlayer(dt, joy, turboActive, turboJustPressed);
        
        // --- HAZARDS (Tehlikeler) ETKİLEŞİMİ ---
        this.level.data.hazards.forEach(h => {
          if(h.type === 'current') {
            if(this.player.pos.x > h.x && this.player.pos.x < h.x+h.w && this.player.pos.y > h.y && this.player.pos.y < h.y+h.h) {
              this.player.applyForce(h.dir.mult(h.force * 10));
            }
          } else if(h.type === 'whirlpool') {
            let dist = this.player.pos.dist(new Vec2(h.x, h.y));
            if(dist < h.r) {
              let pullDir = new Vec2(h.x, h.y).sub(this.player.pos).normalize();
              let pullStrength = (1 - dist/h.r) * h.force * 15;
              this.player.applyForce(pullDir.mult(pullStrength));
            }
          }
        });

        // --- DÜŞMAN (Enemies) ETKİLEŞİMİ ---
        this.level.updateEnemies(dt);
        this.level.data.enemies.forEach(e => {
          if(Collision.circleCircle(this.player, {pos: new Vec2(e.x, e.y), radius: e.r})) {
            if(e.type === 'urchin') {
              this.player.stamina = 0;
              let knockbackDir = this.player.pos.sub(new Vec2(e.x, e.y)).normalize();
              this.player.vel = knockbackDir.mult(15);
              Renderer.shake(0.4);
              Haptics.play(40);
              ParticleSystem.burst(e.x, e.y, 10, '#000');
            } else if(e.type === 'jellyfish' && this.player.shockTimer <= 0) {
              this.player.shockTimer = 1.5;
              Renderer.shake(0.3);
              Haptics.play([20, 20, 20]);
              ParticleSystem.burst(this.player.pos.x, this.player.pos.y, 15, '#ffff00');
            }
          }
        });

        Renderer.updateCamera(this.player.pos, this.player.vel, this.player.isDashing, dt);
        
        this.level.data.tiles.forEach(t => {
          if(!t.broken) Collision.resolveCircleRect(this.player, t);
        });
        
        this.level.stars.forEach(s => {
          if(!s.collected && Collision.circleCircle(this.player, {pos: new Vec2(s.x, s.y), radius: s.r})) {
            s.collected = true; this.stars++; 
            AudioSystem.sfx.collect();
            Haptics.play(10);
            ParticleSystem.burst(s.x, s.y, 10, 'gold');
          }
        });
        
        ParticleSystem.update(dt);
        
        if(Collision.circleCircle(this.player, {pos: new Vec2(this.level.data.goal.x, this.level.data.goal.y), radius: this.level.data.goal.r})) {
          AudioSystem.sfx.win();
          Haptics.play([50, 50, 100]);
          SaveSystem.complete(this.level.data.id, this.stars);
          const nextId = LEVELS[LEVELS.findIndex(l=>l.id===this.level.data.id)+1]?.id;
          if(nextId) SaveSystem.unlock(nextId);
          StateMachine.change('level_complete', {id: this.level.data.id, stars: this.stars, time: this.time});
        }
      },
      render() {
        Renderer.clear();
        this.level.renderBg();
        this.level.renderFg();
        ParticleSystem.render(Renderer.ctx, Renderer.camera);
        this.player.render();
        
        const ctx = Renderer.ctx;
        
        // UI: Yıldız ve Süre
        ctx.fillStyle = 'white'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(`Yıldız: ${this.stars}/3  Süre: ${Math.floor(this.time)}s`, 20, 40);
        
        // Pause Butonu (HUD)
        const w = window.innerWidth;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(w - 80, 20, 60, 40, 10); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillRect(w - 60, 30, 6, 20); ctx.fillRect(w - 46, 30, 6, 20);
        
        // UI: Stamina Bar (Balığın altında)
        const {x: px, y: py} = Renderer.worldToScreen(this.player.pos.x, this.player.pos.y + 35);
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(px - 25, py, 50, 6, 3); ctx.fill();
        ctx.fillStyle = this.player.stamina > 25 ? '#00ffff' : '#ff3333';
        ctx.beginPath(); ctx.roundRect(px - 25, py, (this.player.stamina/this.player.maxStamina)*50, 6, 3); ctx.fill();

        // UI: Görsel Joystick
        if (InputSystem.joystick.active) {
          ctx.beginPath(); ctx.arc(InputSystem.joystick.origin.x, InputSystem.joystick.origin.y, 60, 0, Math.PI*2); 
          ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill(); 
          ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.stroke();
          
          ctx.beginPath(); ctx.arc(InputSystem.joystick.current.x, InputSystem.joystick.current.y, 25, 0, Math.PI*2); 
          ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill();
        }
        
        // UI: Turbo Geri Bildirimi (Sağ ekran dokunuşu)
        if (InputSystem.turbo.active) {
          for(let [id, t] of InputSystem.touches) {
            if(t.startX >= window.innerWidth/2) {
              ctx.beginPath(); ctx.arc(t.x, t.y, 30 + Math.sin(Date.now()/50)*5, 0, Math.PI*2); 
              ctx.fillStyle = 'rgba(0,255,255,0.2)'; ctx.fill();
            }
          }
        }
      }
    };

    StateMachine.states.pause = {
      enter(id) {
        this.levelId = id;
        const w = window.innerWidth, h = window.innerHeight;
        UI.addText(w/2, h/3, "DURAKLATILDI", "bold 40px sans-serif", "white");
        UI.addBtn(w/2 - 100, h/2, 200, 50, "Devam", () => StateMachine.change('play', this.levelId), '#2ecc71');
        UI.addBtn(w/2 - 100, h/2 + 70, 200, 50, "Menü", () => {
          Game.level = null;
          StateMachine.change('menu');
        }, '#e74c3c');
      },
      update() {}, render() { Renderer.ctx.fillStyle='rgba(0,0,0,0.5)'; Renderer.ctx.fillRect(0,0,window.innerWidth,window.innerHeight); }
    };

    StateMachine.states.level_complete = {
      enter(data) {
        const s = SaveSystem.load();
        const prevStars = s.stars[data.id] || 0;
        const newStars = Math.max(0, data.stars - prevStars);
        const earnedPearls = 5 + (newStars * 10);
        
        UI.addText(window.innerWidth/2, window.innerHeight/3 - 40, "BÖLÜM TAMAMLANDI!", "bold 36px sans-serif", "gold");
        UI.addText(window.innerWidth/2, window.innerHeight/3 + 20, `Yıldız: ${'★'.repeat(data.stars)}${'☆'.repeat(3-data.stars)}`, "24px sans-serif", "gold");
        UI.addText(window.innerWidth/2, window.innerHeight/3 + 60, `Süre: ${Math.floor(data.time)}s`, "20px sans-serif", "white");
        UI.addText(window.innerWidth/2, window.innerHeight/3 + 100, `+${earnedPearls} İnci Kazanıldı!`, "bold 24px sans-serif", "cyan");
        
        UI.addBtn(window.innerWidth/2 - 100, window.innerHeight/2 + 70, 200, 50, "İleri", () => StateMachine.change('level_select'), '#3498db');
      },
      update() {}, render() { Renderer.ctx.fillStyle='rgba(0,0,0,0.8)'; Renderer.ctx.fillRect(0,0,window.innerWidth,window.innerHeight); }
    };

    let Game = { level: null }; // Global Game objesi pause için gerekli
    
    // ============================================
    // 10. MAIN INITIALIZATION
    // ============================================
    let lastTime = performance.now();
    function gameLoop() {
      const now = performance.now();
      const dt = Math.min((now - lastTime)/1000, 0.1);
      lastTime = now;
      StateMachine.update(dt);
      StateMachine.render();
      requestAnimationFrame(gameLoop);
    }

    window.onload = () => {
      Renderer.init();
      InputSystem.init();
      AudioSystem.init();
      StateMachine.change('menu');
      requestAnimationFrame(gameLoop);
    };
  </script>
</body>
</html>
